name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test and package
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-provider: basic

      - name: Run tests and package application
        run: ./gradlew --no-daemon clean test bootJar

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            build/reports/tests/test/
            build/test-results/test/
          if-no-files-found: warn
          retention-days: 14

      - name: Upload application JAR
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: build/libs/*.jar
          if-no-files-found: error
          retention-days: 14

  container-image:
    name: Build and smoke-test image
    needs: test
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: expense_db
          POSTGRES_USER: expense_user
          POSTGRES_PASSWORD: expense_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U expense_user -d expense_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout sources
        uses: actions/checkout@v6

      - name: Build production image
        run: docker build --tag expense-settlement-system:ci .

      - name: Start application container
        run: >-
          docker run --detach
          --name expense-app-ci
          --network host
          --env SPRING_DATASOURCE_URL=jdbc:postgresql://localhost:5432/expense_db
          --env SPRING_DATASOURCE_USERNAME=expense_user
          --env SPRING_DATASOURCE_PASSWORD=expense_password
          expense-settlement-system:ci

      - name: Verify application health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent http://localhost:8080/actuator/health > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          exit 1

      - name: Show application logs after failure
        if: failure()
        run: docker logs expense-app-ci || true

      - name: Stop application container
        if: always()
        run: docker rm --force expense-app-ci || true
