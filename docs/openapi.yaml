openapi: 3.0.3
info:
  title: Expense Settlement API
  description: 経費精算システムの実装済み REST API 仕様。
  version: 0.1.0
servers:
  - url: http://localhost:8080
    description: Local development server
tags:
  - name: Auth
    description: 認証 API
  - name: ExpenseApplications
    description: 経費申請 API
  - name: Health
    description: ヘルスチェック

paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: ログイン確認
      description: メールアドレスとパスワードを検証し、認証方式とユーザー情報を返す。
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: ログインユーザー取得
      description: 認証済みユーザー自身の情報を返す。
      operationId: getCurrentUser
      security:
        - basicAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/expense-applications:
    get:
      tags:
        - ExpenseApplications
      summary: 経費申請一覧検索
      description: 経費申請を検索する。現実装ではログインユーザー本人の申請のみ取得できる。
      operationId: searchExpenseApplications
      security:
        - basicAuth: []
      parameters:
        - name: applicantId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: 申請者 ID。USER は自分以外を指定不可。
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ExpenseStatus'
        - name: keyword
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
          description: タイトル部分一致キーワード。
        - name: expenseDateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: expenseDateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 検索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationPageApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      tags:
        - ExpenseApplications
      summary: 経費申請作成
      description: 経費申請を DRAFT として作成する。
      operationId: createExpenseApplication
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseApplicationRequest'
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/expense-applications/{id}:
    get:
      tags:
        - ExpenseApplications
      summary: 経費申請詳細取得
      description: 経費申請ヘッダと明細を取得する。現実装では本人の申請のみ取得できる。
      operationId: getExpenseApplicationById
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    put:
      tags:
        - ExpenseApplications
      summary: 経費申請更新
      description: DRAFT または RETURNED の経費申請を更新する。更新後は DRAFT に戻す。
      operationId: updateExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpenseApplicationRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      tags:
        - ExpenseApplications
      summary: 経費申請削除
      description: DRAFT または RETURNED の経費申請を削除する。
      operationId: deleteExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoidApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/expense-applications/{id}/submit:
    post:
      tags:
        - ExpenseApplications
      summary: 経費申請を申請
      description: DRAFT または RETURNED の経費申請を SUBMITTED に変更する。
      operationId: submitExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      responses:
        '200':
          description: 申請成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/expense-applications/{id}/approve:
    post:
      tags:
        - ExpenseApplications
      summary: 経費申請を承認
      description: APPROVER または ADMIN が SUBMITTED の経費申請を APPROVED に変更する。自分の申請は承認できない。
      operationId: approveExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      responses:
        '200':
          description: 承認成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/expense-applications/{id}/return:
    post:
      tags:
        - ExpenseApplications
      summary: 経費申請を差戻し
      description: APPROVER または ADMIN が SUBMITTED の経費申請を RETURNED に変更する。自分の申請は差戻しできない。
      operationId: returnExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnExpenseApplicationRequest'
      responses:
        '200':
          description: 差戻し成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /actuator/health:
    get:
      tags:
        - Health
      summary: ヘルスチェック
      description: Spring Boot Actuator のヘルスチェック。
      operationId: getHealth
      responses:
        '200':
          description: アプリケーション稼働中
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic

  parameters:
    ExpenseApplicationId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 経費申請 ID

  responses:
    BadRequest:
      description: リクエスト不正または業務ルール違反
    Unauthorized:
      description: 未認証または認証失敗
    Forbidden:
      description: 権限不足
    NotFound:
      description: 対象データなし

  schemas:
    ApiResponseBase:
      type: object
      required:
        - success
        - timestamp
      properties:
        success:
          type: boolean
        message:
          type: string
          nullable: true
        timestamp:
          type: string
          format: date-time

    AuthApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResponse'

    UserApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserResponse'

    ExpenseApplicationDetailApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ExpenseApplicationDetailResponse'

    ExpenseApplicationPageApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ExpenseApplicationPageResponse'

    VoidApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: object
              nullable: true

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          maxLength: 100

    AuthResponse:
      type: object
      properties:
        authenticationType:
          type: string
          example: Basic
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeCode:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/RoleType'
        roleName:
          type: string
        department:
          type: string

    CreateExpenseApplicationRequest:
      type: object
      required:
        - title
        - items
      properties:
        title:
          type: string
          maxLength: 200
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ExpenseItemRequest'

    UpdateExpenseApplicationRequest:
      allOf:
        - $ref: '#/components/schemas/CreateExpenseApplicationRequest'

    ExpenseItemRequest:
      type: object
      required:
        - expenseDate
        - category
        - amount
        - description
      properties:
        expenseDate:
          type: string
          format: date
        category:
          $ref: '#/components/schemas/ExpenseCategory'
        amount:
          type: number
          minimum: 1
        description:
          type: string
          maxLength: 500
        receiptObjectKey:
          type: string
          maxLength: 500
          nullable: true

    ReturnExpenseApplicationRequest:
      type: object
      required:
        - returnReason
      properties:
        returnReason:
          type: string
          maxLength: 1000

    ExpenseApplicationPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseApplicationSummaryResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    ExpenseApplicationSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        applicantId:
          type: integer
          format: int64
        applicantName:
          type: string
        title:
          type: string
        status:
          $ref: '#/components/schemas/ExpenseStatus'
        statusName:
          type: string
        totalAmount:
          type: number
        submittedAt:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ExpenseApplicationDetailResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        applicant:
          $ref: '#/components/schemas/UserResponse'
        title:
          type: string
        status:
          $ref: '#/components/schemas/ExpenseStatus'
        statusName:
          type: string
        totalAmount:
          type: number
        submittedAt:
          type: string
          format: date-time
          nullable: true
        approvedAt:
          type: string
          format: date-time
          nullable: true
        approver:
          allOf:
            - $ref: '#/components/schemas/UserResponse'
          nullable: true
        returnedAt:
          type: string
          format: date-time
          nullable: true
        returnReason:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseItemResponse'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ExpenseItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        expenseDate:
          type: string
          format: date
        category:
          $ref: '#/components/schemas/ExpenseCategory'
        categoryName:
          type: string
        amount:
          type: number
        description:
          type: string
        receiptObjectKey:
          type: string
          nullable: true

    ExpenseStatus:
      type: string
      enum:
        - DRAFT
        - SUBMITTED
        - APPROVED
        - RETURNED

    ExpenseCategory:
      type: string
      enum:
        - TRANSPORTATION
        - MEAL
        - SUPPLIES
        - ACCOMMODATION
        - OTHER

    RoleType:
      type: string
      enum:
        - USER
        - APPROVER
        - ADMIN
