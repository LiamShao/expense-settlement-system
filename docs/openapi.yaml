openapi: 3.0.3
info:
  title: Expense Settlement API
  description: |-
    日本企業の経費申請・承認フローを想定した REST API。
    `docs/openapi.yaml` を正式契約とし、Swagger UI と Prism Mock Server が同じ定義を利用する。
  version: 0.2.0
servers:
  - url: http://localhost:8080
    description: Local development server
  - url: http://localhost:4010
    description: Prism Mock Server
tags:
  - name: Auth
    description: 認証 API
  - name: ExpenseApplications
    description: 経費申請 API
  - name: AuditLogs
    description: 監査ログ API
  - name: Health
    description: ヘルスチェック

paths:
  /api/auth/login:
    post:
      tags:
        - Auth
      summary: ログイン確認
      description: メールアドレスとパスワードを検証し、認証方式とユーザー情報を返す。
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: ログイン成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/auth/me:
    get:
      tags:
        - Auth
      summary: ログインユーザー取得
      description: 認証済みユーザー自身の情報を返す。
      operationId: getCurrentUser
      security:
        - basicAuth: []
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expense-applications:
    get:
      tags:
        - ExpenseApplications
      summary: 経費申請一覧検索
      description: 経費申請を検索する。USER / APPROVER は本人の申請のみ、ADMIN は全ユーザーの申請を取得できる。
      operationId: searchExpenseApplications
      security:
        - basicAuth: []
      parameters:
        - name: applicantId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: 申請者 ID。USER / APPROVER は自分以外を指定不可。ADMIN は任意指定可能。
        - name: status
          in: query
          required: false
          schema:
            $ref: '#/components/schemas/ExpenseStatus'
        - name: keyword
          in: query
          required: false
          schema:
            type: string
            maxLength: 200
          description: タイトル部分一致キーワード。
        - name: expenseDateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: expenseDateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 検索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationPageApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

    post:
      tags:
        - ExpenseApplications
      summary: 経費申請作成
      description: 経費申請を DRAFT として作成する。
      operationId: createExpenseApplication
      security:
        - basicAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateExpenseApplicationRequest'
      responses:
        '200':
          description: 作成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expense-applications/{id}:
    get:
      tags:
        - ExpenseApplications
      summary: 経費申請詳細取得
      description: 経費申請ヘッダと明細を取得する。USER / APPROVER は本人の申請のみ、ADMIN は全ユーザーの申請を取得できる。
      operationId: getExpenseApplicationById
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      responses:
        '200':
          description: 取得成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    put:
      tags:
        - ExpenseApplications
      summary: 経費申請更新
      description: DRAFT または RETURNED の経費申請を更新する。更新後は DRAFT に戻す。
      operationId: updateExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateExpenseApplicationRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

    delete:
      tags:
        - ExpenseApplications
      summary: 経費申請削除
      description: DRAFT または RETURNED の経費申請を削除する。
      operationId: deleteExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      responses:
        '200':
          description: 削除成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VoidApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expense-applications/{id}/submit:
    post:
      tags:
        - ExpenseApplications
      summary: 経費申請を申請
      description: DRAFT または RETURNED の経費申請を SUBMITTED に変更する。
      operationId: submitExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      responses:
        '200':
          description: 申請成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expense-applications/{id}/approve:
    post:
      tags:
        - ExpenseApplications
      summary: 経費申請を承認
      description: APPROVER または ADMIN が SUBMITTED の経費申請を APPROVED に変更する。自分の申請は承認できない。
      operationId: approveExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      responses:
        '200':
          description: 承認成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/expense-applications/{id}/return:
    post:
      tags:
        - ExpenseApplications
      summary: 経費申請を差戻し
      description: APPROVER または ADMIN が SUBMITTED の経費申請を RETURNED に変更する。自分の申請は差戻しできない。
      operationId: returnExpenseApplication
      security:
        - basicAuth: []
      parameters:
        - $ref: '#/components/parameters/ExpenseApplicationId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReturnExpenseApplicationRequest'
      responses:
        '200':
          description: 差戻し成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ExpenseApplicationDetailApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /api/audit-logs:
    get:
      tags:
        - AuditLogs
      summary: 監査ログ検索
      description: 監査ログを検索する。ADMIN のみ利用可能。
      operationId: searchAuditLogs
      security:
        - basicAuth: []
      parameters:
        - name: userId
          in: query
          required: false
          schema:
            type: integer
            format: int64
          description: 操作ユーザー ID。
        - name: action
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
          description: 操作種別。
        - name: targetType
          in: query
          required: false
          schema:
            type: string
            maxLength: 100
          description: 対象種別。
        - name: createdDateFrom
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: createdDateTo
          in: query
          required: false
          schema:
            type: string
            format: date
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
      responses:
        '200':
          description: 検索成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuditLogPageApiResponse'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '500':
          $ref: '#/components/responses/InternalServerError'

  /actuator/health:
    get:
      tags:
        - Health
      summary: ヘルスチェック
      description: Spring Boot Actuator のヘルスチェック。
      operationId: getHealth
      responses:
        '200':
          description: アプリケーション稼働中
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
      description: Seed user の email と password を使用する HTTP Basic 認証。

  parameters:
    ExpenseApplicationId:
      name: id
      in: path
      required: true
      schema:
        type: integer
        format: int64
        minimum: 1
      description: 経費申請 ID

  responses:
    BadRequest:
      description: リクエスト不正または業務ルール違反
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            validationError:
              summary: Validation error
              value:
                success: false
                code: VALIDATION_ERROR
                message: 入力内容に誤りがあります。
                details:
                  - field: title
                    message: 空白は許可されていません
                path: /api/expense-applications
                timestamp: '2026-07-12T10:00:00'
            businessRuleError:
              summary: 業務ルール違反
              value:
                success: false
                code: BAD_REQUEST
                message: 申請中の経費申請のみ承認・差戻しできます。
                path: /api/expense-applications/10/approve
                timestamp: '2026-07-12T10:00:00'
    Unauthorized:
      description: 未認証または認証失敗
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: UNAUTHORIZED
            message: 認証が必要です。
            path: /api/expense-applications
            timestamp: '2026-07-12T10:00:00'
    Forbidden:
      description: 権限不足
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: FORBIDDEN
            message: 他のユーザーの経費申請は操作できません。
            path: /api/expense-applications/10
            timestamp: '2026-07-12T10:00:00'
    NotFound:
      description: 対象データなし
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: NOT_FOUND
            message: 経費申請が見つかりません。
            path: /api/expense-applications/999
            timestamp: '2026-07-12T10:00:00'
    InternalServerError:
      description: 予期しないシステムエラー
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          example:
            success: false
            code: INTERNAL_SERVER_ERROR
            message: システムエラーが発生しました。
            path: /api/expense-applications
            timestamp: '2026-07-12T10:00:00'

  schemas:
    ErrorResponse:
      type: object
      required:
        - success
        - code
        - message
        - path
        - timestamp
      properties:
        success:
          type: boolean
          enum: [false]
        code:
          type: string
          example: VALIDATION_ERROR
        message:
          type: string
          example: 入力内容に誤りがあります。
        details:
          type: array
          items:
            $ref: '#/components/schemas/ValidationErrorDetail'
        path:
          type: string
          example: /api/expense-applications
        timestamp:
          type: string
          description: ISO-8601 local date-time。アプリケーションの timezone は Asia/Tokyo。
          example: '2026-07-12T10:00:00'

    ValidationErrorDetail:
      type: object
      required:
        - field
        - message
      properties:
        field:
          type: string
          example: title
        message:
          type: string
          example: 空白は許可されていません

    ApiResponseBase:
      type: object
      required:
        - success
        - timestamp
      properties:
        success:
          type: boolean
        message:
          type: string
          nullable: true
        timestamp:
          type: string
          description: ISO-8601 local date-time。アプリケーションの timezone は Asia/Tokyo。
          example: '2026-07-12T10:00:00'

    AuthApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuthResponse'
      example:
        success: true
        data:
          authenticationType: Basic
          user:
            id: 1
            employeeCode: E001
            name: 一般ユーザー
            email: user@example.com
            role: USER
            roleName: 一般ユーザー
            department: 開発部
        message: ログインに成功しました。
        timestamp: '2026-07-12T10:00:00'

    UserApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/UserResponse'
      example:
        success: true
        data:
          id: 1
          employeeCode: E001
          name: 一般ユーザー
          email: user@example.com
          role: USER
          roleName: 一般ユーザー
          department: 開発部
        timestamp: '2026-07-12T10:00:00'

    ExpenseApplicationDetailApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ExpenseApplicationDetailResponse'
      example:
        success: true
        data:
          id: 10
          applicant:
            id: 1
            employeeCode: E001
            name: 一般ユーザー
            email: user@example.com
            role: USER
            roleName: 一般ユーザー
            department: 開発部
          title: 東京出張交通費
          status: DRAFT
          statusName: 下書き
          totalAmount: 1200
          items:
            - id: 100
              expenseDate: '2026-07-10'
              category: TRANSPORTATION
              categoryName: 交通費
              amount: 1200
              description: 東京駅から訪問先までの電車代
          createdAt: '2026-07-12T10:00:00'
          updatedAt: '2026-07-12T10:00:00'
        timestamp: '2026-07-12T10:00:00'

    ExpenseApplicationPageApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ExpenseApplicationPageResponse'
      example:
        success: true
        data:
          content:
            - id: 10
              applicantId: 1
              applicantName: 一般ユーザー
              title: 東京出張交通費
              status: SUBMITTED
              statusName: 申請中
              totalAmount: 1200
              submittedAt: '2026-07-12T09:30:00'
              createdAt: '2026-07-12T09:00:00'
              updatedAt: '2026-07-12T09:30:00'
          page: 0
          size: 20
          totalElements: 1
          totalPages: 1
        timestamp: '2026-07-12T10:00:00'

    AuditLogPageApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AuditLogPageResponse'
      example:
        success: true
        data:
          content:
            - id: 1000
              userId: 1
              userName: 一般ユーザー
              action: EXPENSE_APPLICATION_SUBMIT
              targetType: EXPENSE_APPLICATION
              targetId: 10
              detail: 経費申請を申請しました。
              createdAt: '2026-07-12T09:30:00'
          page: 0
          size: 20
          totalElements: 1
          totalPages: 1
        timestamp: '2026-07-12T10:00:00'

    VoidApiResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponseBase'
        - type: object
          properties:
            data:
              type: object
              nullable: true
      example:
        success: true
        message: 経費申請を削除しました。
        timestamp: '2026-07-12T10:00:00'

    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          maxLength: 100
          format: password
      example:
        email: user@example.com
        password: Password123!

    AuthResponse:
      type: object
      properties:
        authenticationType:
          type: string
          example: Basic
        user:
          $ref: '#/components/schemas/UserResponse'

    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        employeeCode:
          type: string
        name:
          type: string
        email:
          type: string
          format: email
        role:
          $ref: '#/components/schemas/RoleType'
        roleName:
          type: string
        department:
          type: string

    CreateExpenseApplicationRequest:
      type: object
      required:
        - title
        - items
      properties:
        title:
          type: string
          maxLength: 200
        items:
          type: array
          minItems: 1
          items:
            $ref: '#/components/schemas/ExpenseItemRequest'
      example:
        title: 東京出張交通費
        items:
          - expenseDate: '2026-07-10'
            category: TRANSPORTATION
            amount: 1200
            description: 東京駅から訪問先までの電車代

    UpdateExpenseApplicationRequest:
      allOf:
        - $ref: '#/components/schemas/CreateExpenseApplicationRequest'

    ExpenseItemRequest:
      type: object
      required:
        - expenseDate
        - category
        - amount
        - description
      properties:
        expenseDate:
          type: string
          format: date
        category:
          $ref: '#/components/schemas/ExpenseCategory'
        amount:
          type: number
          minimum: 1
        description:
          type: string
          maxLength: 500
        receiptObjectKey:
          type: string
          maxLength: 500
          nullable: true
      example:
        expenseDate: '2026-07-10'
        category: TRANSPORTATION
        amount: 1200
        description: 東京駅から訪問先までの電車代
        receiptObjectKey: receipts/2026/07/example.pdf

    ReturnExpenseApplicationRequest:
      type: object
      required:
        - returnReason
      properties:
        returnReason:
          type: string
          maxLength: 1000
      example:
        returnReason: 領収書を確認できないため、再添付してください。

    ExpenseApplicationPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseApplicationSummaryResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    ExpenseApplicationSummaryResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        applicantId:
          type: integer
          format: int64
        applicantName:
          type: string
        title:
          type: string
        status:
          $ref: '#/components/schemas/ExpenseStatus'
        statusName:
          type: string
        totalAmount:
          type: number
        submittedAt:
          type: string
          description: ISO-8601 local date-time
          nullable: true
        createdAt:
          type: string
          description: ISO-8601 local date-time
        updatedAt:
          type: string
          description: ISO-8601 local date-time

    ExpenseApplicationDetailResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        applicant:
          $ref: '#/components/schemas/UserResponse'
        title:
          type: string
        status:
          $ref: '#/components/schemas/ExpenseStatus'
        statusName:
          type: string
        totalAmount:
          type: number
        submittedAt:
          type: string
          description: ISO-8601 local date-time
          nullable: true
        approvedAt:
          type: string
          description: ISO-8601 local date-time
          nullable: true
        approver:
          allOf:
            - $ref: '#/components/schemas/UserResponse'
          nullable: true
        returnedAt:
          type: string
          description: ISO-8601 local date-time
          nullable: true
        returnReason:
          type: string
          nullable: true
        items:
          type: array
          items:
            $ref: '#/components/schemas/ExpenseItemResponse'
        createdAt:
          type: string
          description: ISO-8601 local date-time
        updatedAt:
          type: string
          description: ISO-8601 local date-time

    ExpenseItemResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        expenseDate:
          type: string
          format: date
        category:
          $ref: '#/components/schemas/ExpenseCategory'
        categoryName:
          type: string
        amount:
          type: number
        description:
          type: string
        receiptObjectKey:
          type: string
          nullable: true

    AuditLogPageResponse:
      type: object
      properties:
        content:
          type: array
          items:
            $ref: '#/components/schemas/AuditLogResponse'
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    AuditLogResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        userId:
          type: integer
          format: int64
        userName:
          type: string
        action:
          type: string
          example: EXPENSE_APPLICATION_SUBMIT
        targetType:
          type: string
          example: EXPENSE_APPLICATION
        targetId:
          type: integer
          format: int64
        detail:
          type: string
          nullable: true
        createdAt:
          type: string
          description: ISO-8601 local date-time

    ExpenseStatus:
      type: string
      enum:
        - DRAFT
        - SUBMITTED
        - APPROVED
        - RETURNED

    ExpenseCategory:
      type: string
      enum:
        - TRANSPORTATION
        - MEAL
        - SUPPLIES
        - ACCOMMODATION
        - OTHER

    RoleType:
      type: string
      enum:
        - USER
        - APPROVER
        - ADMIN
