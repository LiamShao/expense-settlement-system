x-java-service: &java-service
  build:
    context: .
    dockerfile: Dockerfile.dev
  working_dir: /workspace
  volumes:
    - .:/workspace
    - gradle-cache:/home/gradle/.gradle
  environment:
    TZ: Asia/Tokyo
    SPRING_PROFILES_ACTIVE: local
    SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/expense_db
    SPRING_DATASOURCE_USERNAME: expense_user
    SPRING_DATASOURCE_PASSWORD: expense_password
  depends_on:
    postgres:
      condition: service_healthy

services:
  backend:
    <<: *java-service
    container_name: expense-backend
    ports:
      - "8080:8080"
    command: ./gradlew --no-daemon bootRun
    healthcheck:
      test: ["CMD", "curl", "--fail", "--silent", "http://localhost:8080/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s

  java-dev:
    <<: *java-service
    profiles:
      - tools
    container_name: expense-java-dev
    stdin_open: true
    tty: true
    command: bash

  postgres:
    image: postgres:16
    container_name: expense-postgres
    environment:
      POSTGRES_DB: expense_db
      POSTGRES_USER: expense_user
      POSTGRES_PASSWORD: expense_password
      TZ: Asia/Tokyo
    ports:
      - "15432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U expense_user -d expense_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-mock:
    image: stoplight/prism:4
    profiles:
      - mock
    command: mock -h 0.0.0.0 /tmp/openapi.yaml
    volumes:
      - ./docs/openapi.yaml:/tmp/openapi.yaml:ro
    ports:
      - "4010:4010"

volumes:
  gradle-cache:
  postgres-data:
