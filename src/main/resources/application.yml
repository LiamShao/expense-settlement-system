spring:
  application:
    name: expense-settlement-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/expense_db}
    username: ${SPRING_DATASOURCE_USERNAME:expense_user}
    password: ${SPRING_DATASOURCE_PASSWORD:expense_password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: Asia/Tokyo
    default-property-inclusion: non_null

server:
  port: ${SERVER_PORT:8080}

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.expense.entity
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui/index.html

logging:
  level:
    root: INFO
    com.example.expense: DEBUG
