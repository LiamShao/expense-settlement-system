spring:
  application:
    name: expense-settlement-system
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://postgres:5432/expense_db}
    username: ${SPRING_DATASOURCE_USERNAME:expense_user}
    password: ${SPRING_DATASOURCE_PASSWORD:expense_password}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
  session:
    timeout: ${SESSION_TIMEOUT:30m}
    jdbc:
      initialize-schema: never
      cleanup-cron: "0 * * * * *"
  jackson:
    time-zone: Asia/Tokyo
    default-property-inclusion: non_null
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 11MB

server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      cookie:
        name: SESSION
        http-only: true
        secure: ${SESSION_COOKIE_SECURE:true}
        same-site: lax

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.example.expense.entity
  configuration:
    map-underscore-to-camel-case: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html
    url: /openapi.yaml
    disable-swagger-default-url: true
    display-request-duration: true
    operations-sorter: method
    tags-sorter: alpha
    persist-authorization: true

app:
  receipt:
    storage:
      type: ${RECEIPT_STORAGE_TYPE:unavailable}
      local-root: ${RECEIPT_LOCAL_ROOT:.local/receipts}
      s3-bucket: ${RECEIPT_S3_BUCKET:}
      s3-region: ${AWS_REGION:ap-northeast-1}
    scanner:
      type: ${RECEIPT_SCANNER_TYPE:unavailable}

logging:
  level:
    root: INFO
    com.example.expense: DEBUG
